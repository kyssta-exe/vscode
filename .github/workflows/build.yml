name: Build Obrith IDE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            vscode_arch: x64
            artifact_name: linux-x64
          - os: macos-latest
            vscode_arch: arm64
            artifact_name: darwin-arm64
          - os: windows-latest
            vscode_arch: x64
            artifact_name: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Dependencies
        run: yarn --frozen-lockfile

      - name: Compile
        run: yarn compile

      - name: Package
        run: yarn package

      - name: Find Package Output
        id: find_package
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "VSIX=$(ls -1 out/*.vsix 2>/dev/null | head -1)" >> $GITHUB_OUTPUT
          else
            echo "VSIX=$(ls -1 out/*.vsix 2>/dev/null | head -1)" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_package.outputs.VSIX }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obrith-${{ matrix.artifact_name }}
          path: ${{ steps.find_package.outputs.VSIX }}
          if-no-files-found: warn
