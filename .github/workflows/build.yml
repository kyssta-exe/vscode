name: Build Obrith IDE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev

      - name: Install dependencies (root only)
        run: npm install --ignore-scripts
        env:
          VSCODE_SKIP_NODE_VERSION_CHECK: '1'

      - name: Install build dependencies
        run: cd build && npm install --ignore-scripts

      - name: Compile
        run: node node_modules/gulp/bin/gulp.js compile-client

      - name: Package
        run: node node_modules/gulp/bin/gulp.js vscode-${{ runner.os == 'Linux' && 'linux-x64' || runner.os == 'macOS' && 'darwin-arm64' || 'win32-x64' }}
        env:
          VSCODE_BUILD: '1'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obrith-${{ runner.os == 'Linux' && 'linux-x64' || runner.os == 'macOS' && 'macos-arm64' || 'win32-x64' }}
          path: .build/**/*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
