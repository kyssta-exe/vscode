name: Build Obrith IDE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            build_args: ''
          - os: macos-latest
            build_args: ''
          - os: windows-latest
            build_args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev

      - name: Install dependencies
        run: yarn --frozen-lockfile --ignore-engines

      - name: Compile
        run: yarn compile-client

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: yarn package
        env:
          VSCODE_BUILD_LINUX: '1'

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: yarn package
        env:
          VSCODE_BUILD_MAC: '1'

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: yarn package
        env:
          VSCODE_BUILD_WIN32: '1'

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: obrith-linux-x64
          path: .build/linux/**/*
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: obrith-macos
          path: .build/darwin/**/*
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: obrith-win32-x64
          path: .build/win32/**/*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
